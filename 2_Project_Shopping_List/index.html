<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Shopping List</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
        <div class="container">
      <h1>Simple Shopping List</h1>
      <label for="productInput"
        >Type in the product you want to add:</label
      >
      <input type="text" id="productInput" name="productInput" placeholder="Type in the product you want to add" maxlength="50" autofocus />

      <button id="button">Click to add product</button>

      <ul id="productList"></ul>
</body>
</html>
